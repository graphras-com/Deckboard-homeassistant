# Deckboard Home Assistant Configuration
#
# This file defines how the Stream Deck+ connects to Home Assistant.
# Designed for standalone deployment on a Raspberry Pi.
#
# All HA entity references are confined to the bindings section.
# The UI layout in screens references only logical binding keys.

# -- Home Assistant connection --
# The token is read from the environment variable specified by token_env.
# Set it in your .env file or systemd EnvironmentFile.
homeassistant:
  url: "http://homeassistant.local:8123"
  token_env: "DECKBOARD_HA_TOKEN"
  reconnect_delay_seconds: 5

# -- Device settings --
device:
  type: "Stream Deck +"
  index: 0
  brightness: 80

# -- Bindings --
# Map logical names to HA entities and their adapter domain.
# The adapter normalizes state and resolves actions.
bindings:
  media.entertainment:
    entity: media_player.entertainment
    adapter: media_player

  # Multi-entity binding: group several number entities under one adapter.
  audio.entertainment:
    adapter: equalizer
    entities:
      sub: number.entertainment_sub_gain
      treble: number.entertainment_treble
      bass: number.entertainment_bass
      balance: number.entertainment_balance

# -- Screens --
screens:
  home:
    # Cards (touchscreen zones, 0-3 on Stream Deck+)
    cards:
      0:
        type: media
        binding: media.entertainment
      1:
        type: ha_media       # Album art + artist/title + state + volume bar
        binding: media.entertainment